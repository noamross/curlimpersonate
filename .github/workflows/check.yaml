name: check

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  schedule:
    # Mondays 06:00 UTC — weekly run on main to catch breaking changes in the
    # upstream curl-impersonate releases / fingerprint behaviour.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  # Packaging + unit tests (integration disabled here).
  R-CMD-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - uses: r-lib/actions/check-r-package@v2

  # Real download + rebuild + live requests. On Linux we additionally exercise
  # the no-rebuild preload path. Also runs weekly via the schedule above.
  live:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      CURLIMPERSONATE_TEST_INTEGRATION: "true"
      NOT_CRAN: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::jsonlite
            any::curl
            any::httr2
            any::testthat
            any::withr
          needs: check
      - name: Install package
        run: R CMD INSTALL .

      # macOS: tools::R_user_dir() resolves to "~/Library/Application Support/..."
      # which contains a space that breaks CURL_LIBS shell-flag parsing.
      - name: Set space-free R user data dir (macOS)
        if: runner.os == 'macOS'
        run: echo "R_USER_DATA_DIR=/tmp/r-user-data" >> $GITHUB_ENV

      # Linux: the lexiforest archive ships no headers; install the system ones.
      - name: Install curl development headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libcurl4-openssl-dev

      # Rebuild path: download libcurl-impersonate, rebuild curl, and confirm the
      # server-seen fingerprint changes across all profiles (test-integration.R).
      - name: Rebuild path — integration tests across all profiles
        run: Rscript -e 'testthat::test_dir("tests/testthat", stop_on_failure = TRUE)'

      # Preload path: no rebuild. LD_PRELOAD libcurl-impersonate into the stock,
      # dynamically linked curl and confirm the fingerprint changes. Linux only —
      # the macOS CRAN curl is statically linked, so preload cannot work there.
      - name: Preload path (Linux) — LD_PRELOAD the existing curl, no rebuild
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          LIB="$(Rscript -e 'cat(curlimpersonate::impersonate_lib())')"
          echo "impersonate lib: $LIB"
          # Precondition: the stock curl must be dynamically linked.
          Rscript -e 'stopifnot(identical(curlimpersonate::impersonate_linkage()$linkage, "dynamic"))'
          fetch='cat(jsonlite::fromJSON(rawToChar(curl::curl_fetch_memory("https://tls.peet.ws/api/all")$content))$tls$ja4)'
          BASE="$(Rscript -e "$fetch")"
          IMP="$(LD_PRELOAD="$LIB" CURL_IMPERSONATE=chrome116 CURL_IMPERSONATE_HEADERS=yes Rscript -e "$fetch")"
          echo "baseline JA4:  $BASE"
          echo "preloaded JA4: $IMP"
          test -n "$IMP" && [ "$BASE" != "$IMP" ]
          echo "$IMP" | grep -Eq '^t1[0-9]d'
          echo "Preload OK: stock curl + LD_PRELOAD changed the fingerprint without a rebuild."
